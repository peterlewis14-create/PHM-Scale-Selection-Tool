<!DOCTYPE html>
<html>

<head>
  <title>Hydraulic Model Scale Selection Tool (Rev2)</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 40px;
      background: #f5f7fa;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .section {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 8px;
    }

    button {
      padding: 10px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .result {
      background: #eef2f7;
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">

<h1>Hydraulic Scale Selection Tool</h1>

<div class="section">
<h2>Prototype</h2>
L <input id="L" type="number" value="200"><br>
W <input id="W" type="number" value="50"><br>
Q <input id="Q" type="number" value="100"><br>
Hmax <input id="Hmax" type="number" value="20"><br>
Emin <input id="Emin" type="number" value="0"><br>
</div>

<div class="section">
<h2>Lab</h2>
L <input id="Lb" type="number" value="10"><br>
W <input id="Wb" type="number" value="5"><br>
H <input id="Hb" type="number" value="2"><br>
Q <input id="Qb" type="number" value="2000"><br>
</div>

<div style="text-align:center;">
<button onclick="run()">Run Scale Selection</button>
</div>

<div class="section">

<h2>Results</h2>

<div id="output" class="result"></div>

<h3>Scale vs Utilisation</h3>

<canvas id="scaleChart"></canvas><br>

<input type="range" id="scaleSlider" min="5" max="100" step="5"><br>

<div id="sliderValue"></div>
<div id="intersections"></div>

</div>

</div>

<script type="module">
import { runEngine } from "./engine/engine.js";

window.run = async () => {

  const result = await runEngine({
    prototype: {
      L: Number(L.value),
      W: Number(W.value),
      Q: Number(Q.value),
      Hmax: Number(Hmax.value),
      Emin: Number(Emin.value)
    },
    lab: {
      L: Number(Lb.value),
      W: Number(Wb.value),
      H: Number(Hb.value),
      Q: Number(Qb.value)
    },
    context: { issues: [] }
  });

  // ✅ TEXT OUTPUT
  output.innerHTML = `
  <b>Recommended:</b> 1:${result.recommendedScale}<br>
  <b>Feasible:</b> ${result.feasibleRange.join(", ")}<br>
  <b>Utilisation:</b> ${(result.governingUtilisation * 100).toFixed(0)}%
  `;

  // ✅ GRAPH
  const data = result.allScales;

  const labels = data.map(d => "1:" + d.scale);

  const footprint = data.map(d => d.feasible ? d.utilFoot * 100 : null);
  const flow = data.map(d => d.feasible ? d.utilFlow * 100 : null);
  const height = data.map(d => d.feasible ? d.utilHeight * 100 : null);

  if (window.chart) window.chart.destroy();

  const ctx = document.getElementById("scaleChart");

  window.chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [
        { label: "Footprint", data: footprint, borderColor: "blue" },
        { label: "Flow", data: flow, borderColor: "green" },
        { label: "Height", data: height, borderColor: "orange" }
      ]
    },
    options: {
      plugins: {
        legend: { position: "top" }
      },
      scales: {
        x: { title: { display: true, text: "Scale" } },
        y: { title: { display: true, text: "% Utilisation" } }
      }
    }
  });

  // ✅ SLIDER
  const slider = document.getElementById("scaleSlider");

  slider.value = result.recommendedScale;

  slider.oninput = () => {
    const s = Number(slider.value);

    sliderValue.innerHTML = "Scale: 1:" + s;

    const p = data.find(d => d.scale === s);

    intersections.innerHTML = `
      Footprint: ${(p.utilFoot * 100).toFixed(1)}%<br>
      Flow: ${(p.utilFlow * 100).toFixed(1)}%<br>
      Height: ${(p.utilHeight * 100).toFixed(1)}%<br>
      Feasible: ${p.feasible}
    `;
  };

  slider.dispatchEvent(new Event("input"));

};
</script>

</body>
</html>
